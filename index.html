<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            background-attachment: fixed;
            margin: 0; padding: 15px; 
            min-height: 100vh;
        }

        #result-box { width: 100%; max-width: 600px; margin: 0 auto; }

        /* রাজকীয় রাউন্ডেড কার্ড ডিজাইন */
        .result-item { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px);
            padding: 20px; 
            margin-bottom: 20px; 
            border-radius: 25px; 
            border-left: 10px solid #D4AF37; /* গোল্ডেন বর্ডার */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            animation: royalReveal 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
        }

        /* রাজকীয় সোর্স ট্যাগ */
        .source-tag { 
            background: linear-gradient(135deg, #1A2A6C, #B21F1F);
            color: white; padding: 5px 15px; border-radius: 50px; 
            font-size: 11px; font-weight: bold; display: inline-block;
            margin-bottom: 12px;
        }

        .meaning-text { font-size: 18px; color: #1a2a6c; line-height: 1.6; }
        .label { color: #b21f1f; font-weight: bold; }

        @keyframes royalReveal {
            0% { opacity: 0; transform: translateY(40px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        #loading { display: none; text-align: center; color: #b21f1f; font-weight: bold; padding: 10px; }
</style>
  </head>
  <body>
    <div id="loading">✨ রাজকীয় তথ্য আনা হচ্ছে...</div>
    <div id="result-box"></div>

<script>
        const urls = [
            { name: "Premium DB", url: "https://raw.githubusercontent.com/MORADhusain/Database/main/English_to_Bangla.txt" },
            { name: "Medicine Royal", url: "https://raw.githubusercontent.com/MORADhusain/Database/main/Medicine_Database.txt" }
        ];

        async function runSearchFromApp(query) {
            const resultBox = document.getElementById('result-box');
            const loading = document.getElementById('loading');
            resultBox.innerHTML = "";
            loading.style.display = "block";

            let found = false;

            for (const db of urls) {
                try {
                    const res = await fetch(db.url);
                    const data = await res.text();
                    data.split('\n').forEach(line => {
                        if (line.toLowerCase().trim().startsWith(query.toLowerCase())) {
                            appendResult(db.name, line);
                            found = true;
                        }
                    });
                } catch (e) {}
            }

            // Google Translate API Integration
            try {
                const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=bn&dt=t&q=${encodeURI(query)}`);
                const data = await res.json();
                if (data && data[0][0][0]) {
                    appendResult("Global Server", `${query} | <span class="label">অর্থ:</span> ${data[0][0][0]}`);
                    found = true;
                }
            } catch (e) {}

            loading.style.display = "none";
            if (!found) resultBox.innerHTML = "<div class='result-item'>দুঃখিত! কিছু পাওয়া যায়নি।</div>";
        }

        function appendResult(source, content) {
            const resultBox = document.getElementById('result-box');
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `<span class="source-tag">${source}</span><div class="meaning-text">${content}</div>`;
            resultBox.appendChild(div);
        }
</script>
  </body>
</html>
